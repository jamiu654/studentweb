<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jamiu Developer - Full Stack Web Developer Portfolio</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Student Result App</h1>
            <div class="stack">
                <input class="input" type="text" id="studentname" placeholder="Enter student name">
                <input class="input" type="number" id="studentscore" placeholder="Enter student score">
                <div>
                    <button id="addbtn" class="btn primary">Add Student</button>
                    <button id="clearbtn" class="btn ghost">Clear</button>
                </div>
                <div id="studentList" aria-live="polite"></div>
            </div>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
